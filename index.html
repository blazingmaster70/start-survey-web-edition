<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Survey</title>
    <style>
        body {
            color: #ffffff;
            font-family: Arial, sans-serif;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2rem;
            font-weight: normal;
            text-align: center;
            max-width: 800px;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .button-container {
            display: flex;
            gap: 15px;
        }

        button {
            font-family: Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            font-size: 1.1rem;
            padding: 12px 32px;
            border: 1px solid #ffffff;
            border-radius: 0px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.15s ease-in-out;
        }

        button:hover {
            background-color: #ffffff;
            color: #000000;
        }

        button:active {
            background-color: #cccccc;
            color: #000000;
        }
    </style>
</head>

<body>

    <h1 id="question">Start Survey?</h1>

    <div class="button-container" id="options">
        <button id="btn-start" onclick="startSurvey()">Start</button>
        <button id="btn-yes" onclick="handleAnswer('Yes')" style="display: none;">Yes</button>
        <button id="btn-no" onclick="handleAnswer('No')" style="display: none;">No</button>
    </div>

    <script>
        const questions = [
            "Are you having a nice day?",
            "Do you have many responsibilities?",
            "Look around for a moment.",
            "Do you know where you are?",
            "Have you ever had a panic attack?",
            "Have you ever felt like somebody was in your room?",
            "Do you find yourself questioning your existence?",
            "Do you believe there is a God?",
            "Are you scared of the dark?",
            "Are you answering these questions out of free will?",
            "Are you certain?",
            "Have you ever had a dream that felt so real, it was hard to distinguish it from reality?",
            "Do you have any phobias?",
            "Do you feel comfortable in your room?",
            "Do you remember what you were doing an hour ago?",
            "Have you noticed any subtle changes in your surroundings today?",
            "Do you trust your own memory?",
            "Have you ever heard a sound in your house that you couldn't explain?",
            "Do you feel like you are being watched right now?",
            "If you closed your eyes, could you accurately describe what is behind you?",
            "Are you confident that you are the only one in the room?",
            "Have you ever felt a sudden drop in temperature for no reason?",
            "Do you think your reflection always mirrors your exact movements?",
            "Are you afraid of losing control?",
            "If a voice called your name from another room, would you answer?",
            "Do you feel safe behind locked doors?",
            "Have you ever felt time slow down when you were afraid?",
            "Do you believe in premonitions?",
            "Are you sure you want to finish this survey?"
        ];

        let currentIndex = 0;

        function startSurvey() {
            document.getElementById("btn-start").style.display = "none";
            document.getElementById("btn-yes").style.display = "inline-block";
            document.getElementById("btn-no").style.display = "inline-block";
            updateDisplay();
        }

        function updateDisplay() {
            const heading = document.getElementById("question");
            const options = document.getElementById("options");

            if (currentIndex < questions.length) {
                heading.textContent = questions[currentIndex];

                if (questions[currentIndex] === "Look around for a moment.") {
                    options.style.display = "none";
                    setTimeout(() => {
                        currentIndex++;
                        options.style.display = "flex";
                        updateDisplay();
                    }, 5000);
                } else {
                    options.style.display = "flex";
                }
            } else {
                heading.textContent = "Survey Complete";
                options.style.display = "none";
            }
        }

        function handleAnswer(answer) {
            currentIndex++;
            updateDisplay();
        }
    </script>

</body>

</html>
